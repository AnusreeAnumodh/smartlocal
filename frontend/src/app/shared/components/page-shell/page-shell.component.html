<section class="page-shell">
  <header class="page-shell-header">
    <div class="page-shell-copy">
      <p class="shell-kicker">Workspace</p>
      <h2>{{ title }}</h2>
      <p *ngIf="subtitle">{{ subtitle }}</p>
    </div>
    <div class="page-shell-actions">
      <nav class="page-shell-nav">
        <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
        <a routerLink="/booking/providers" routerLinkActive="active">Providers</a>
        <a routerLink="/booking/my-bookings" routerLinkActive="active">My Bookings</a>
        <a routerLink="/booking/manage" routerLinkActive="active" *ngIf="isProviderOrAdmin">Manage Requests</a>
      </nav>
    </div>
  </header>
  <ng-content></ng-content>
</section>
