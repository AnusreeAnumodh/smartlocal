<div class="layout">
  <header class="topbar" *ngIf="showHeader">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <div>
        <p class="eyebrow">{{ appMeta.eyebrow }}</p>
        <h1>{{ appMeta.title }}</h1>
        <p class="brand-copy">{{ appMeta.tagline }}</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="session-copy" *ngIf="showSessionCopy">
        <span class="session-label">Signed in as</span>
        <strong>{{ currentUserName }}</strong>
        <span class="session-role">{{ currentUserRole }}</span>
      </div>
      <button class="secondary-button" *ngIf="isAuthenticated" (click)="logout()">Logout</button>
    </div>
  </header>

  <section class="content">
    <router-outlet></router-outlet>
  </section>
</div>
