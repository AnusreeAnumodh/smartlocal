<div class="layout">
  <div class="layout-orb orb-a" aria-hidden="true"></div>
  <div class="layout-orb orb-b" aria-hidden="true"></div>
  <div class="layout-grid" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <span class="brand-ring"></span>
        <span class="brand-core"></span>
      </div>
      <div>
        <p class="eyebrow">SmartLocal</p>
        <h1>Service and Emergency Console</h1>
        <p class="brand-copy">Fast local discovery, verified providers, and emergency-ready access.</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="session-copy" *ngIf="showSessionCopy">
        <span class="session-label">Signed in as</span>
        <strong>{{ currentUserName }}</strong>
        <span class="session-role">{{ currentUserRole }}</span>
      </div>
      <button *ngIf="isAuthenticated" (click)="logout()">Logout</button>
    </div>
  </header>

  <section class="content">
    <router-outlet></router-outlet>
  </section>
</div>
